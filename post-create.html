<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 작성</title>

    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/posts.css" />
  </head>
  <body>
    <header class="header">
      <a
        href="./posts.html"
        class="header-back-button"
        aria-label="게시글 목록으로 이동"
      >
        &lt;
      </a>

      <h1 class="header-title">아무 말 대잔치</h1>

      <button
        class="header-profile-button"
        type="button"
        aria-label="회원 메뉴"
      >
        <span class="header-profile-image"></span>
      </button>
      <nav class="header-profile-menu" aria-label="회원 메뉴">
        <a href="./profile-edit.html" class="header-profile-menu-item">
          회원정보수정
        </a>
        <a href="./password-edit.html" class="header-profile-menu-item">
          비밀번호수정
        </a>
        <button type="button" class="header-profile-menu-item logout-button">
          로그아웃
        </button>
      </nav>
    </header>

    <main class="post-create-page">
      <section class="post-create-section">
        <h2 class="post-create-title">게시글 작성</h2>

        <form class="post-create-form" novalidate>
          <div class="post-create-field">
            <label for="postTitle" class="post-create-label">제목*</label>

            <input
              id="postTitle"
              class="post-title-input"
              type="text"
              maxlength="26"
              placeholder="제목을 입력해주세요. (최대 26글자)"
            />
          </div>

          <div class="post-create-field post-content-field">
            <label for="postContent" class="post-create-label">내용*</label>

            <textarea
              id="postContent"
              class="post-content-textarea"
              placeholder="내용을 입력해주세요."
            ></textarea>

            <p id="postCreateHelperText" class="post-create-helper-text"></p>
          </div>

          <div class="post-image-field">
            <label class="post-image-label">이미지</label>

            <div class="post-file-row">
              <label for="postImage" class="post-file-button">파일 선택</label>
              <input
                id="postImage"
                class="post-file-input"
                type="file"
                accept="image/*"
              />
              <span id="postFileName" class="post-file-name">
                파일을 선택해주세요.
              </span>
            </div>
          </div>

          <button type="submit" class="post-submit-button">완료</button>
        </form>
      </section>
    </main>
    <script src="./js/common.js"></script>
    <script src="./js/posts.js"></script>
  </body>
</html>
