<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비밀번호 수정</title>

    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/user.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="header-title">아무 말 대잔치</h1>

      <button
        class="header-profile-button"
        type="button"
        aria-label="회원 메뉴"
      >
        <span class="header-profile-image"></span>
      </button>
      <nav class="header-profile-menu" aria-label="회원 메뉴">
        <a href="./profile-edit.html" class="header-profile-menu-item">
          회원정보수정
        </a>
        <a href="./password-edit.html" class="header-profile-menu-item">
          비밀번호수정
        </a>
        <button type="button" class="header-profile-menu-item logout-button">
          로그아웃
        </button>
      </nav>
    </header>

    <main class="password-edit-page">
      <section class="password-edit-section">
        <h2 class="password-edit-title">비밀번호 수정</h2>

        <form class="password-edit-form" novalidate>
          <div class="password-edit-field">
            <label for="password" class="password-edit-label">비밀번호</label>
            <input
              id="password"
              class="password-edit-input"
              type="password"
              placeholder="비밀번호를 입력하세요"
            />
            <p id="passwordHelperText" class="password-helper-text"></p>
          </div>

          <div class="password-edit-field password-confirm-field">
            <label for="passwordConfirm" class="password-edit-label">
              비밀번호 확인
            </label>
            <input
              id="passwordConfirm"
              class="password-edit-input"
              type="password"
              placeholder="비밀번호를 한번 더 입력하세요"
            />
            <p id="passwordConfirmHelperText" class="password-helper-text"></p>
          </div>

          <button type="submit" class="password-submit-button">수정하기</button>
        </form>

        <div class="profile-toast" id="passwordToast">수정완료</div>
      </section>
    </main>
    <script src="./js/common.js"></script>
    <script src="./js/users.js"></script>
  </body>
</html>
