<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>

    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/auth.css" />
  </head>
  <body>
    <header class="header">
      <a
        href="./index.html"
        class="header-back-button"
        aria-label="로그인 페이지로 이동"
      >
        &lt;
      </a>
      <h1 class="header-title">아무 말 대잔치</h1>
    </header>

    <main class="signup-page">
      <section class="signup-section">
        <h2 class="signup-title">회원가입</h2>

        <form class="signup-form">
          <div class="profile-area">
            <label class="profile-label">프로필 사진</label>
            <p class="profile-helper-text">* helper text</p>

            <button
              type="button"
              class="profile-image-button"
              aria-label="프로필 사진 추가"
            >
              <span class="plus-icon"></span>
            </button>
          </div>

          <div class="signup-input-area">
            <div class="signup-form-field">
              <label for="signupEmail" class="signup-label">이메일*</label>
              <input
                id="signupEmail"
                class="signup-input"
                type="email"
                placeholder="이메일을 입력하세요"
              />
              <p class="signup-helper-text">* helper text</p>
            </div>

            <div class="signup-form-field">
              <label for="signupPassword" class="signup-label">비밀번호*</label>
              <input
                id="signupPassword"
                class="signup-input"
                type="password"
                placeholder="비밀번호를 입력하세요"
              />
              <p class="signup-helper-text">* helper text</p>
            </div>

            <div class="signup-form-field">
              <label for="signupPasswordConfirm" class="signup-label"
                >비밀번호 확인*</label
              >
              <input
                id="signupPasswordConfirm"
                class="signup-input"
                type="password"
                placeholder="비밀번호를 한번 더 입력하세요"
              />
              <p class="signup-helper-text">* helper text</p>
            </div>

            <div class="signup-form-field">
              <label for="signupNickname" class="signup-label">닉네임*</label>
              <input
                id="signupNickname"
                class="signup-input"
                type="text"
                placeholder="닉네임을 입력하세요"
              />
              <p class="signup-helper-text">* helper text</p>
            </div>

            <button type="submit" class="signup-button">회원가입</button>
          </div>
        </form>

        <a href="./index.html" class="login-link"> 로그인하러 가기 </a>
      </section>
    </main>
  </body>
</html>
