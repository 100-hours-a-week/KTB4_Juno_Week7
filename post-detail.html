<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 상세</title>

    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/posts.css" />
  </head>
  <body>
    <header class="header">
      <a
        href="./posts.html"
        class="header-back-button"
        aria-label="게시글 목록으로 이동"
      >
        &lt;
      </a>

      <h1 class="header-title">아무 말 대잔치</h1>

      <button
        class="header-profile-button"
        type="button"
        aria-label="회원 메뉴"
      >
        <span class="header-profile-image"></span>
      </button>
      <nav class="header-profile-menu" aria-label="회원 메뉴">
        <a href="./profile-edit.html" class="header-profile-menu-item">
          회원정보수정
        </a>
        <a href="./password-edit.html" class="header-profile-menu-item">
          비밀번호수정
        </a>
        <button type="button" class="header-profile-menu-item logout-button">
          로그아웃
        </button>
      </nav>
    </header>

    <main class="post-detail-page">
      <section class="post-detail-section">
        <div class="post-detail-header">
          <h2 class="post-detail-title" id="postDetailTitle"></h2>

          <div class="post-detail-meta-row">
            <div class="post-detail-author">
              <div
                class="post-detail-author-image"
                id="postDetailAuthorImage"
              ></div>
              <span
                class="post-detail-author-name"
                id="postDetailAuthorName"
              ></span>
              <time class="post-detail-date" id="postDetailDate"></time>
            </div>

            <div class="post-detail-actions">
              <a
                href="./post-edit.html"
                class="post-detail-action-button"
                id="postEditLink"
              >
                <span class="post-detail-action-text">수정</span>
              </a>
              <button
                type="button"
                class="post-detail-action-button post-delete-button"
              >
                <span class="post-detail-action-text">삭제</span>
              </button>
            </div>
          </div>
        </div>

        <div class="post-detail-divider"></div>
        <div class="post-detail-image" id="postDetailImage"></div>

        <p class="post-detail-content" id="postDetailContent"></p>
        <div class="post-detail-stats">
          <button type="button" class="post-detail-stat-card like-stat-card">
            <strong
              class="post-detail-stat-number like-count"
              id="postDetailLikeCount"
            >0</strong>
            <span class="post-detail-stat-label">좋아요수</span>
          </button>

          <div class="post-detail-stat-card">
            <strong
              class="post-detail-stat-number view-count"
              id="postDetailViewCount"
            >0</strong>
            <span class="post-detail-stat-label">조회수</span>
          </div>

          <div class="post-detail-stat-card">
            <strong
              class="post-detail-stat-number comment-count"
              id="postDetailCommentCount"
            >0</strong>
            <span class="post-detail-stat-label">댓글</span>
          </div>
        </div>
        <div class="post-detail-bottom-divider"></div>

        <form class="comment-create-form">
          <textarea
            class="comment-create-textarea"
            placeholder="댓글을 남겨주세요!"
          ></textarea>

          <div class="comment-create-divider"></div>

          <div class="comment-create-button-area">
            <button type="submit" class="comment-create-button">
              댓글 등록
            </button>
          </div>
        </form>
        <div class="comment-list" id="commentList"></div>
      </section>
    </main>
    <div class="modal-backdrop" id="commentDeleteModal">
      <div class="delete-modal">
        <h3 class="delete-modal-title">댓글을 삭제하시겠습니까?</h3>
        <p class="delete-modal-description">
          삭제한 내용은 복구 할 수 없습니다.
        </p>

        <div class="delete-modal-actions">
          <button type="button" class="delete-modal-cancel-button">취소</button>
          <button type="button" class="delete-modal-confirm-button">
            확인
          </button>
        </div>
      </div>
    </div>
    <div class="modal-backdrop" id="postDeleteModal">
      <div class="delete-modal">
        <h3 class="delete-modal-title">게시글을 삭제하시겠습니까?</h3>
        <p class="delete-modal-description">
          삭제한 내용은 복구 할 수 없습니다.
        </p>

        <div class="delete-modal-actions">
          <button type="button" class="delete-modal-cancel-button">취소</button>
          <button type="button" class="delete-modal-confirm-button">
            확인
          </button>
        </div>
      </div>
    </div>
    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/posts.js"></script>
  </body>
</html>
