<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게시글 목록</title>

    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/posts.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="header-title">아무 말 대잔치</h1>

      <button
        class="header-profile-button"
        type="button"
        aria-label="회원 메뉴"
      >
        <span class="header-profile-image"></span>
      </button>
      <nav class="header-profile-menu" aria-label="회원 메뉴">
        <a href="./profile-edit.html" class="header-profile-menu-item">
          회원정보수정
        </a>
        <a href="./password-edit.html" class="header-profile-menu-item">
          비밀번호수정
        </a>
        <button type="button" class="header-profile-menu-item logout-button">
          로그아웃
        </button>
      </nav>
    </header>

    <main class="posts-page">
      <section class="posts-section">
        <p class="posts-intro">
          안녕하세요,<br />
          아무 말 대잔치 <strong>게시판</strong> 입니다.
        </p>

        <a href="./post-create.html" class="post-create-button">
          게시글 작성
        </a>

        <div class="post-list" id="postList">
          <a href="./post-detail.html" class="post-card-link">
            <article class="post-card">
              <div class="post-card-top">
                <h2 class="post-title">제목 1</h2>

                <div class="post-info-row">
                  <div class="post-stats">
                    <span>좋아요 0</span>
                    <span>댓글 0</span>
                    <span>조회수 0</span>
                  </div>

                  <time class="post-date">2021-01-01 00:00:00</time>
                </div>
              </div>

              <div class="post-card-bottom">
                <div class="post-author-image"></div>
                <span class="post-author-name">더미 작성자 1</span>
              </div>
            </article>
          </a>
        </div>
      </section>
    </main>
    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/posts.js"></script>
  </body>
</html>
